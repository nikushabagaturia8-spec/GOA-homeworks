   <b><p class="p1">ზღვის კუები (ლათ. Chelonioidea), კუების რიგი. შეიცავს 1 ოჯახს საკუთრივ ზღვის კუსებრნს (Cheliniidae). მოზრდილი ცხოველებია, მთელ სიცოცხლეს წყალში ატარებენ. ხმელეთზე ამოდიან მხოლოდ კვერცხის დასადებად. დაბალი ჯავშანი აქვთ. თავის მთლიანად შეწევა ჯავშანში არ შეუძლიათ. კიდურები ფარფლებადაა ქცეული.</p></b>
   <video src="assets/videos/videoplayback.mp4"controls>
    <p class="p2"> წინა კიდურები გრძელია. მუცლის ფარი ზურგის ფარისაგან გამოყოფილია. გავრცელებული არიან ტროპიკულ და სუბტროპიკულ ზღვეებში, იშვიათად ზომიერ სარტყელში. არსებობს 4 გვარის თითო სახეობა. ზღვის კუები ასეულ კმ გადიან საკვებისა და გამრავლებისათვის ხელსაყრელი ადგილებისაკენ. დებენ რამდენიმე ათეულიდან 200-მდე და ზოგჯერ მეტ კვერცხს. მწვანე კუ (Chelonia mydas) — ყველაზე დიდია. მათი ჯავშნის სიგრძე 1,4 მ აღწევს, წონა 400 კგ-მდე. იკვებება წყალმცენარეებით. აქვს გემრიელი ხორცი და კვერცხი.</p>
